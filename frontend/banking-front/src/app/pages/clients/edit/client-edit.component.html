<section class="page">
  <h1 class="page__title">Editar Cliente</h1>
  @if (client()) {
    <form (ngSubmit)="onSubmit()">
      <app-client-form [formControl]="formCtrl" />
      <div class="page__actions">
        <a btn variant="secondary" routerLink="/clientes">Cancelar</a>
        <button
          btn
          variant="primary"
          type="submit"
          appClickTracking
          [eventName]="'client_update'"
          [loading]="saving()"
        >
          Guardar
        </button>
      </div>
    </form>
  } @else {
    <app-skeleton width="100%" height="300px" borderRadius="10px" />
  }
</section>
