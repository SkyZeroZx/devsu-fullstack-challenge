<ng-container [formGroup]="form" (focusout)="onTouchedFn()">
  <div class="form__row">
    <div>
      <app-input-field label="Nombre" formControlName="nombre" />
    </div>
    <div>
      <app-input-field
        label="Identificación"
        formControlName="identificacion"
      />
    </div>
  </div>
  <div class="form__row">
    <div>
      <app-select-field
        label="Género"
        formControlName="genero"
        [options]="genderOptions"
        placeholder="Seleccione"
      />
    </div>
    <div>
      <app-input-field
        label="Edad"
        type="number"
        formControlName="edad"
        min="1"
        [integer]="true"
      />
    </div>
  </div>
  <div class="form__row">
    <div>
      <app-input-field label="Dirección" formControlName="direccion" />
    </div>
    <div>
      <app-input-field
        label="Teléfono"
        formControlName="telefono"
        [customErrors]="{
          pattern: 'Ingrese un número celular ecuatoriano válido (09XXXXXXXX)',
        }"
      />
    </div>
  </div>
  @if (showPassword()) {
    <div>
      <app-input-field
        label="Contraseña"
        type="password"
        formControlName="contrasena"
      />
    </div>
  }
  <app-checkbox-field label="Activo" formControlName="estado" />
</ng-container>
