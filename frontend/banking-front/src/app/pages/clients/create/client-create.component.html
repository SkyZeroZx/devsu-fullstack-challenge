<section class="page">
  <h1 class="page__title">Nuevo Cliente</h1>
  <form (ngSubmit)="onSubmit()">
    <app-client-form [formControl]="formCtrl" />
    <div class="page__actions">
      <a btn variant="secondary" routerLink="/clientes">Cancelar</a>
      <button
        btn
        variant="primary"
        type="submit"
        appClickTracking
        [eventName]="'client_create'"
        [loading]="saving()"
      >
        Guardar
      </button>
    </div>
  </form>
</section>
