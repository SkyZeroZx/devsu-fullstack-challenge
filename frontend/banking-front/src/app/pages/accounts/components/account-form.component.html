<ng-container [formGroup]="form" (focusout)="onTouchedFn()">
  <div class="form__row">
    <div>
      <app-input-field label="Nro. Cuenta" formControlName="numeroCuenta" />
    </div>
    <div>
      <app-select-field
        label="Tipo"
        formControlName="tipoCuenta"
        [options]="accountTypeOptions"
      />
    </div>
  </div>
  <div class="form__row">
    <div>
      <app-input-field
        label="Saldo Inicial"
        type="number"
        formControlName="saldoInicial"
        min="0"
        step="0.01"
      />
    </div>
    <div>
      @if (isEditMode()) {
        <app-input-field
          label="Cliente"
          [ngModel]="clientName()"
          [ngModelOptions]="{ standalone: true }"
          [readonly]="true"
        />
      } @else {
        <app-client-select formControlName="clienteId" />
      }
    </div>
  </div>
  <app-checkbox-field label="Activa" formControlName="estado" />
</ng-container>
