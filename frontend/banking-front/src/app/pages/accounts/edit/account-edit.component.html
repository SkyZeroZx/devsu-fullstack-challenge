<section class="page">
  <h1 class="page__title">Editar Cuenta</h1>

  @if (!account()) {
    <app-skeleton width="100%" height="300px" borderRadius="10px" />
  }
  <form [hidden]="!account()" (ngSubmit)="onSubmit()">
    <app-account-form [formControl]="editAccountForm" />
    <div class="page__actions">
      <a btn variant="secondary" routerLink="/cuentas"
        ><app-icon name="close" /> Cancelar</a
      >
      <button
        btn
        variant="primary"
        type="submit"
        appClickTracking
        [eventName]="'account_update'"
        [loading]="saving()"
      >
        <app-icon name="save" /> Guardar
      </button>
    </div>
  </form>
</section>
