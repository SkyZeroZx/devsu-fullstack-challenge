<section class="page">
  <h1 class="page__title">Nueva Cuenta</h1>
  <form (ngSubmit)="onSubmit()">
    <app-account-form [formControl]="createAccountForm" />
    <div class="page__actions">
      <a btn variant="secondary" routerLink="/cuentas"><app-icon name="close" /> Cancelar</a>
      <button
        btn
        variant="primary"
        type="submit"
        appClickTracking
        [eventName]="'account_create'"
        [loading]="saving()"
      >
        <app-icon name="save" /> Guardar
      </button>
    </div>
  </form>
</section>
