<section class="page">
  <h1 class="page__title">Nueva Cuenta</h1>
  <form (ngSubmit)="onSubmit()">
    <app-account-form [formControl]="formCtrl" />
    <div class="page__actions">
      <a btn variant="secondary" routerLink="/cuentas">Cancelar</a>
      <button
        btn
        variant="primary"
        type="submit"
        appClickTracking
        [eventName]="'account_create'"
        [loading]="saving()"
      >
        Guardar
      </button>
    </div>
  </form>
</section>
