<div class="login">
  <div class="login__card">
    <h1 class="login__title">BANCO</h1>
    <p class="login__subtitle">Iniciar sesión</p>

    @if (error(); as err) {
      <p class="login__error" role="alert">{{ err }}</p>
    }

    <form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div>
        <app-input-field
          label="Usuario"
          formControlName="username"
          autocomplete="username"
          placeholder="Ingrese su usuario"
        />
      </div>
      <div>
        <app-input-field
          label="Contraseña"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Ingrese su contraseña"
        />
      </div>

      <button
        btn
        variant="primary"
        size="lg"
        type="submit"
        appClickTracking
        [eventName]="'login_attempt'"
        [loading]="loading()"
      >
        Ingresar
      </button>
    </form>
  </div>
</div>
