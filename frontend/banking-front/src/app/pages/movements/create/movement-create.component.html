<section class="page">
  <h1 class="page__title">Nuevo Movimiento</h1>
  <form (ngSubmit)="onSubmit()">
    <app-movement-form [formControl]="formCtrl" />
    <div class="page__actions">
      <a btn variant="secondary" routerLink="/movimientos"><app-icon name="close" /> Cancelar</a>
      <button
        btn
        variant="primary"
        type="submit"
        appClickTracking
        [eventName]="'movement_create'"
        [loading]="saving()"
      >
        <app-icon name="add_circle" /> Registrar
      </button>
    </div>
  </form>
</section>
