@if (label()) {
  <label class="field__label" [attr.for]="fieldId" data-testid="label">{{
    label()
  }}</label>
}
<input
  class="field__input"
  data-testid="input"
  [id]="fieldId"
  [type]="type()"
  [placeholder]="placeholder()"
  [disabled]="disabled()"
  [attr.step]="step()"
  [attr.min]="min()"
  [attr.aria-invalid]="invalid() || null"
  (input)="onInputChange($event)"
  (blur)="markTouched()"
  #inputRef
/>
