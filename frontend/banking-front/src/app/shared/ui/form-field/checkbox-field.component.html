<label class="field__switch" [attr.for]="fieldId" data-testid="checkbox-label">
  <input
    class="field__switch-input"
    type="checkbox"
    data-testid="checkbox"
    [id]="fieldId"
    [checked]="value()"
    [disabled]="disabled()"
    (change)="onCheckboxChange($event)"
    (blur)="markTouched()"
  />
  <span class="field__switch-track" aria-hidden="true">
    <span class="field__switch-thumb"></span>
  </span>
  <span class="field__switch-label">{{ label() }}</span>
</label>
