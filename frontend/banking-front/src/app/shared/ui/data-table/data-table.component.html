@if (loading()) {
  <div class="data-table__skeleton" data-testid="skeleton">
    @for (row of skeletonRows; track $index) {
      <app-skeleton height="2.5rem" borderRadius="4px" />
    }
  </div>
} @else {
  <div class="data-table__wrapper">
    <table
      class="data-table__table"
      role="grid"
      [attr.aria-label]="ariaLabel() || null"
      data-testid="table"
    >
      <thead>
        <tr>
          @for (col of columns(); track col.appTableColumn()) {
            <th scope="col">{{ col.header() }}</th>
          }
        </tr>
      </thead>
      <tbody>
        @for (row of rows(); track $index) {
          <tr>
            @for (col of columns(); track col.appTableColumn()) {
              <td>
                <ng-container
                  [ngTemplateOutlet]="col.templateRef"
                  [ngTemplateOutletContext]="{ $implicit: row }"
                />
              </td>
            }
          </tr>
        } @empty {
          <tr>
            <td
              [attr.colspan]="columns().length"
              class="data-table__empty"
              data-testid="empty-message"
            >
              {{ emptyMessage() }}
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-paginator
    [(page)]="page"
    [size]="size()"
    [totalElements]="totalElements()"
  />
}
