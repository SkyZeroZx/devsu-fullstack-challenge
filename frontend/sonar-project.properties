# SonarCloud – Frontend (Angular)
# These values must match what you configured in sonarcloud.io

sonar.organization=YOUR_SONAR_ORG
sonar.projectKey=YOUR_SONAR_PROJECT_KEY_FRONTEND
sonar.projectName=Devsu Banking – Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/*.spec.ts,src/environments/**

# Point to the coverage report generated by Jest/Karma
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
