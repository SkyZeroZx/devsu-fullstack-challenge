# SonarCloud – Frontend (Angular)
# These values must match what you configured in sonarcloud.io

sonar.organization=skyzerozx
sonar.projectKey=skyzerozx_frontend-fullstack
sonar.projectName=frontend-fullstack
sonar.projectVersion=1.0

sonar.sources=banking-front/src
sonar.tests=banking-front/src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/*.spec.ts,banking-front/src/environments/**

# Point to the coverage report generated by Jest/Karma
sonar.javascript.lcov.reportPaths=banking-front/coverage/banking-front/lcov.info
sonar.typescript.lcov.reportPaths=banking-front/coverage/banking-front/lcov.info
