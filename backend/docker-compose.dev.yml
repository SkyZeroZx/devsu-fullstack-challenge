services:
  seed:
    image: postgres:18-alpine
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-devsu_banking}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SEED_PROFILE: dev
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - ./scripts:/scripts:ro
    command: sh /scripts/seed.sh
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banking-network
    restart: "no"

  banking-service:
    environment:
      SPRING_PROFILES_ACTIVE: docker,dev
    depends_on:
      seed:
        condition: service_completed_successfully

  auth-service:
    environment:
      SPRING_PROFILES_ACTIVE: docker,dev
    depends_on:
      seed:
        condition: service_completed_successfully

  api-gateway:
    depends_on:
      - banking-service
      - auth-service
