spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: false

jwt:
  secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-enough
  expiration-ms: 3600000
