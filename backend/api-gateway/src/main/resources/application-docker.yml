spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://banking-prod.com"
              - "https://www.banking-prod.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8091}
          predicates:
            - Path=/auth/**
        - id: banking-service
          uri: ${BANKING_SERVICE_URL:http://banking-service:8090}
          predicates:
            - Path=/api/**
