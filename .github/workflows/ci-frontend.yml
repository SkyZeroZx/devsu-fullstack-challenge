name: CI - Frontend

on:
  push:
    branches: [master, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  build-and-analyze:
    name: Build, Test & SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # required for SonarCloud blame info

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/banking-front/package-lock.json

      - name: Install dependencies
        working-directory: frontend/banking-front
        run: npm ci

      - name: Check code formatting
        working-directory: frontend/banking-front
        run: npm run format:check

      - name: Code Linting
        working-directory: frontend/banking-front
        run: npm run lint

      # ── Adjust the test command to match your Angular test/coverage config ──
      - name: Run tests with coverage
        working-directory: frontend/banking-front
        run: npm run test -- --coverage --watchAll=false

      - name: Analyze with SonarCloud
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_FRONT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
